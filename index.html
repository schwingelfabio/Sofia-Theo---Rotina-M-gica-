<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="loading" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#ffecd2;display:flex;align-items:center;justify-content:center;z-index:10000;font-family:sans-serif;flex-direction:column;">
      <div style="font-size:24px;font-weight:bold;color:#80deea;margin-bottom:10px;">NEURO-SYNC ENGINE</div>
      <div style="width:200px;height:4px;background:rgba(128,222,234,0.2);border-radius:2px;overflow:hidden;">
        <div style="width:100%;height:100%;background:#80deea;animation:load 2s infinite ease-in-out;"></div>
      </div>
      <style>@keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}</style>
    </div>
    <canvas id="world"></canvas>
    <script src="https://unpkg.com/three@0.173.0/build/three.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('loading').style.display = 'none';
        }, 1000);
      });
    </script>
  </body>
</html>
