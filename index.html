<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sofia & Theo: Rotina Mágica</title>
    <style>
        :root {
            --teal: #40E0D0;
            --soft-pink: #FFB6C1;
            --warm-yellow: #FFFACD;
            --text-dark: #4A4A4A;
            --white: #FFFFFF;
            --neon-blue: #00F2FF;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background-color: var(--warm-yellow);
            color: var(--text-dark);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Telas */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
        }

        #city-screen {
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
            overflow: hidden;
        }

        /* Elementos Flutuantes Mágicos */
        .magic-item {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
            animation: moveSlow 10s infinite linear;
        }

        @keyframes moveSlow {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(50px, 50px) rotate(360deg); }
        }

        /* HUD */
        #hud {
            position: fixed;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 26px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 1000;
            border: 4px solid var(--teal);
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(10px);
        }

        #calm-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 90px;
            height: 90px;
            background: var(--white);
            border-radius: 50%;
            border: 5px solid var(--soft-pink);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #calm-btn:active { transform: scale(0.9); }

        /* Edifícios Estilizados */
        .building {
            position: absolute;
            cursor: pointer;
            text-align: center;
            z-index: 10;
            transition: filter 0.3s, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .building:hover { transform: scale(1.1) rotate(2deg); filter: brightness(1.1); }

        .building img {
            width: 180px;
            border-radius: 30px;
            border: 6px solid var(--white);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .building span {
            background: rgba(255,255,255,0.95);
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 800;
            font-size: 20px;
            color: var(--text-dark);
            border: 3px solid var(--teal);
            margin-top: 10px;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* Personagens e Balões */
        .character-guide {
            position: absolute;
            bottom: 10px;
            left: 20px;
            z-index: 20;
            pointer-events: none;
        }

        .bubble {
            background: white;
            padding: 20px 30px;
            border-radius: 35px;
            margin-bottom: 5px;
            border: 4px solid var(--teal);
            font-size: 22px;
            font-weight: bold;
            color: var(--text-dark);
            max-width: 350px;
            line-height: 1.4;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            position: relative;
        }

        .bubble::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 40px;
            border-width: 20px 20px 0;
            border-style: solid;
            border-color: var(--teal) transparent transparent;
        }

        /* Animações Pixar Style */
        @keyframes welcomeIn {
            from { opacity: 0; transform: scale(0.8) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        #city-screen.active {
            display: flex;
            animation: welcomeIn 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .animate-float { animation: float 4s infinite ease-in-out; }

        /* Botões Grandes e Coloridos */
        .big-btn {
            padding: 25px 50px;
            font-size: 32px;
            border-radius: 60px;
            background: linear-gradient(135deg, var(--teal), #00BFA5);
            color: white;
            border: none;
            margin: 15px;
            cursor: pointer;
            box-shadow: 0 12px 25px rgba(64, 224, 208, 0.4);
            transition: all 0.2s;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .big-btn:active { transform: translateY(4px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

    </style>
</head>
<body>

    <div id="hud">💖 <span id="stars">0</span> Corações</div>
    <div id="calm-btn" title="Calm Zone">🧘</div>

    <!-- Tela Inicial / Cidade -->
    <div id="city-screen" class="screen active">
        <!-- Elementos Mágicos Flutuantes -->
        <div class="magic-item" style="top:10%; left:5%; font-size:40px;">🧩</div>
        <div class="magic-item" style="top:15%; right:10%; font-size:35px; animation-delay: -2s;">💖</div>
        <div class="magic-item" style="bottom:20%; left:15%; font-size:30px; animation-delay: -5s;">🧩</div>
        <div class="magic-item" style="bottom:25%; right:8%; font-size:38px; animation-delay: -3s;">💖</div>
        <div class="magic-item" style="top:40%; right:20%; font-size:25px; animation-delay: -7s;">✨</div>

        <div style="z-index: 50; text-align:center; position:absolute; top:40px; width:100%;">
            <h1 style="margin:0; font-size:48px; color:var(--text-dark); text-shadow: 3px 3px 0 white, -1px -1px 0 white, 1px -1px 0 white, -1px 1px 0 white; font-family: 'Comic Sans MS', cursive;">Sofia & Theo</h1>
            <div style="font-size:32px; background:var(--white); display:inline-block; padding:5px 25px; border-radius:30px; border:4px solid var(--soft-pink); margin-top:-10px; font-weight:bold;">Rotina Mágica</div>
        </div>

        <!-- Edifícios ao Redor -->
        <div class="building" style="top: 22%; left: 18%;" onclick="loadRoom('casa')">
            <img src="https://picsum.photos/seed/home_pink/400/400" alt="Casa" referrerPolicy="no-referrer" style="border-color: var(--soft-pink);">
            <br><span>Minha Casa</span>
        </div>

        <div class="building" style="top: 18%; right: 18%;" onclick="loadRoom('consultorio')">
            <img src="https://picsum.photos/seed/clinic_ai/400/400" alt="Consultório" referrerPolicy="no-referrer" style="border-color: #ADD8E6;">
            <br><span>Neuro-Conecta AI</span>
        </div>

        <div class="building" style="bottom: 35%; left: 12%;" onclick="loadRoom('escola')">
            <img src="https://picsum.photos/seed/school_teal/400/400" alt="Escola" referrerPolicy="no-referrer" style="border-color: var(--teal);">
            <br><span>Escola Amiga</span>
        </div>

        <div class="building" style="bottom: 30%; right: 12%;" onclick="loadRoom('parque')">
            <img src="https://picsum.photos/seed/playful_park/400/400" alt="Parque" referrerPolicy="no-referrer" style="border-color: #90EE90;">
            <br><span>Parquinho</span>
        </div>

        <!-- Sofia & Theo no Centro (Interactive) -->
        <div id="central-actors" class="animate-float" style="position:absolute; bottom:15%; left:50%; transform:translateX(-50%); display:flex; align-items:flex-end; gap:20px; z-index:100; cursor:pointer;" onclick="centralGreeting()">
            <img src="https://ais-pre-vmd6mdvcvg7pcqhqzwjlam-155588884904.us-east1.run.app/assets/sofia_avatar.png" style="width:180px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));" onerror="this.src='https://picsum.photos/seed/sofia/300/400'">
            <img src="https://ais-pre-vmd6mdvcvg7pcqhqzwjlam-155588884904.us-east1.run.app/assets/theo_avatar.png" style="width:160px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));" onerror="this.src='https://picsum.photos/seed/theo/300/400'">
        </div>

        <div class="character-guide" style="width:100%; bottom:60px; left:0;">
            <div id="city-msg-container" style="display:flex; justify-content:center; width:100%;">
                <div class="bubble animate-float" id="city-msg" style="text-align:center;">Escolha um lugar para brincar hoje! ✨</div>
            </div>
        </div>
    </div>

    <!-- Conteúdo dos Quartos (Dynamic) -->
    <div id="room-screen" class="screen">
        <button class="back-btn" onclick="backToCity()">⬅ Voltar</button>
        <div id="room-content" style="text-align:center; padding: 50px;">
            <!-- Conteúdo dinâmico aqui -->
        </div>
        <div class="character-guide">
            <div class="bubble" id="room-msg">Muito bem!</div>
            <img src="https://ais-pre-vmd6mdvcvg7pcqhqzwjlam-155588884904.us-east1.run.app/assets/theo_avatar.png" id="room-guide-img" style="width:150px;" onerror="this.src='https://picsum.photos/seed/boy/200/200'">
        </div>
    </div>

    <!-- Calm Zone -->
    <div id="calm-screen" class="screen" style="background-color: #E0FFFF;">
        <button class="back-btn" onclick="hideCalm()">⬅ Voltar</button>
        <div id="respira">RESPIRO</div>
        <p style="font-size:24px; margin-top:100px; color:#5F9EA0;">Acompanhe o movimento...</p>
    </div>

    <script>
        let stars = 0;
        const screens = {
            city: document.getElementById('city-screen'),
            room: document.getElementById('room-screen'),
            calm: document.getElementById('calm-screen')
        };

        function updateHUD() {
            document.getElementById('stars').innerText = stars;
        }

        function loadRoom(type) {
            screens.city.classList.remove('active');
            screens.room.classList.add('active');
            const content = document.getElementById('room-content');
            const roomMsg = document.getElementById('room-msg');

            if(type === 'casa') {
                roomMsg.innerText = "Vamos organizar nossa rotina? Arraste as tarefas!";
                content.innerHTML = `
                    <h2 style="font-size:32px; color:var(--soft-pink);">Minha Casa</h2>
                    <p style="font-size:20px;">O que fazemos primeiro?</p>
                    <div id="task-zone" class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)">
                        <span style="color:#aaa;">Solte aqui</span>
                    </div>
                    <div class="drag-container">
                        <div class="card" draggable="true" ondragstart="drag(event)" id="c1">☀️<br>Acordar</div>
                        <div class="card" draggable="true" ondragstart="drag(event)" id="c2">🪥<br>Escovar</div>
                        <div class="card" draggable="true" ondragstart="drag(event)" id="c3">🍎<br>Comer</div>
                    </div>
                `;
            } else if(type === 'escola') {
                roomMsg.innerText = "Na escola, falamos sobre como nos sentimos!";
                content.innerHTML = `
                    <h2 style="font-size:32px; color:var(--teal);">Escola Amiga</h2>
                    <p style="font-size:24px;">Como você está se sentindo agora?</p>
                    <div style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap;">
                        <button class="big-btn" onclick="reward(5)">😊 Feliz</button>
                        <button class="big-btn" onclick="reward(5)">🤨 Curioso</button>
                        <button class="big-btn" onclick="reward(5)">😴 Cansado</button>
                    </div>
                `;
            } else if(type === 'parque') {
                roomMsg.innerText = "É hora de brincar! No parquinho, cada um tem sua vez.";
                content.innerHTML = `
                    <h2 style="font-size:32px; color:#228B22;">Parquinho</h2>
                    <p style="font-size:24px;">Theo está brincando no balanço.</p>
                    <button class="big-btn" onclick="reward(10)">Esperar minha vez</button>
                    <button class="big-btn" onclick="reward(10)">Chamar para brincar</button>
                `;
            } else if(type === 'consultorio') {
                roomMsg.innerText = "O doutor é nosso amigo e nos ajuda a crescer.";
                content.innerHTML = `
                    <h2 style="font-size:32px; color:#4682B4;">Neuro-Conecta AI</h2>
                    <p style="font-size:24px;">Vamos conversar um pouco?</p>
                    <div style="background:#f9f9f9; padding:20px; border-radius:20px; border:2px solid #ddd; max-width:600px; margin:0 auto;">
                        <p id="clinic-chat">Doutor: Olá! Hoje vamos aprender mais sobre os Corações Mágicos.</p>
                        <button class="big-btn" style="font-size:20px;" onclick="talkToDoctor()">Ouvir o Doutor</button>
                    </div>
                `;
            }
        }

        function centralGreeting() {
            const msg = document.getElementById('city-msg');
            const greetings = [
                "Oi! Eu sou a Sofia. Vamos brilhar juntos? 💖",
                "Olá! Eu sou o Theo. Adoro aventuras! 🍎",
                "Você é incrível! Onde vamos agora? ✨",
                "Sinto muita alegria em brincar com você! 😊"
            ];
            msg.innerText = greetings[Math.floor(Math.random() * greetings.length)];
            reward(1);
        }

        function talkToDoctor() {
            const chat = document.getElementById('clinic-chat');
            const messages = [
                "Doutor: Cada coração que você ganha mostra como você é corajoso!",
                "Doutor: Respire fundo quando precisar de calma.",
                "Doutor: Você é muito especial para nós!"
            ];
            chat.innerText = messages[Math.floor(Math.random() * messages.length)];
            reward(2);
        }

        function backToCity() {
            screens.room.classList.remove('active');
            screens.city.classList.add('active');
        }

        function reward(amount) {
            stars += amount;
            updateHUD();
            const msg = document.getElementById('room-msg');
            msg.innerText = "Incrível! Você ganhou " + amount + " corações! ✨";
            msg.style.color = "var(--teal)";
        }

        // Drag and Drop Logic
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            ev.target.innerHTML = "";
            ev.target.appendChild(document.getElementById(data));
            reward(5);
        }

        // Calm Zone Logic
        let calmInterval;
        document.getElementById('calm-btn').onclick = function() {
            screens.city.classList.remove('active');
            screens.room.classList.remove('active');
            screens.calm.classList.add('active');
            
            const respira = document.getElementById('respira');
            let expanding = true;
            
            calmInterval = setInterval(() => {
                if(expanding) {
                    respira.innerText = "RESPIRE...";
                    respira.classList.add('respira-expand');
                } else {
                    respira.innerText = "SOLTE...";
                    respira.classList.remove('respira-expand');
                }
                expanding = !expanding;
            }, 4000);
        };

        function hideCalm() {
            clearInterval(calmInterval);
            screens.calm.classList.remove('active');
            screens.city.classList.add('active');
        }

        // Init
        updateHUD();

    </script>
</body>
</html>
